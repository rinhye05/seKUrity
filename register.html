<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seKUrity — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --accent: #2ade02; --accent-dim: rgba(42,222,2,0.15);
    --accent-glow: rgba(42,222,2,0.6); --bg: #000; --bg2: #050a03;
    --border: rgba(42,222,2,0.35); --text: #c8f5c0;
    --text-dim: rgba(200,245,192,0.9); --danger: #ff3030;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; font-size:15px; line-height:1.8; min-height:100vh; display:flex; flex-direction:column; }
  body::before {
    content:''; position:fixed; inset:0; z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    pointer-events:none;
  }
  nav {
    border-bottom:1px solid var(--border); background:rgba(0,0,0,0.92);
    backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(16px,4vw,48px); height:56px;
  }
  .nav-logo { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; letter-spacing:4px; color:var(--text); text-decoration:none; }
  .nav-logo .ku { color:var(--accent); text-shadow:0 0 10px var(--accent-glow); }
  .page-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 16px; }
  .card {
    border:1px solid var(--border); background:rgba(42,222,2,0.03);
    padding:48px 40px; width:100%; max-width:440px; position:relative;
    clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:var(--accent); }
  .card-title { font-family:'Orbitron',sans-serif; font-size:22px; font-weight:700; margin-bottom:8px; }
  .card-title span { color:var(--accent); }
  .card-sub { font-size:13px; color:var(--text-dim); letter-spacing:2px; margin-bottom:36px; }
  .field { margin-bottom:20px; }
  .field label { display:block; font-size:10px; letter-spacing:3px; color:var(--accent); margin-bottom:8px; text-transform:uppercase; }
  .field input {
    width:100%; background:rgba(42,222,2,0.04); border:1px solid var(--border);
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:14px;
    padding:12px 16px; outline:none; transition:border-color .2s;
  }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(42,222,2,0.15); }
  .field-hint { font-size:10px; color:var(--text-dim); margin-top:6px; }
  .btn {
    width:100%; padding:14px; border:1px solid var(--accent);
    background:rgba(42,222,2,0.08); color:var(--accent);
    font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer; transition:background .2s, box-shadow .2s;
    clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
    margin-top:8px;
  }
  .btn:hover { background:rgba(42,222,2,0.18); box-shadow:0 0 20px rgba(42,222,2,0.25); }
  .msg { font-size:12px; margin-top:16px; padding:10px 14px; border:1px solid; display:none; }
  .msg.error { color:var(--danger); border-color:var(--danger); background:rgba(255,48,48,0.05); }
  .msg.success { color:var(--accent); border-color:var(--accent); background:rgba(42,222,2,0.05); }
  .links { margin-top:24px; text-align:center; font-size:13px; color:var(--text-dim); }
  .links a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">se<span class="ku">KU</span>rity</a>
</nav>
<div class="page-wrap">
  <div class="card">
    <div class="card-title">se<span>KU</span>rity</div>
    <div class="card-sub">// MEMBER REGISTER</div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="name" placeholder="홍길동">
      <div class="field-hint">// 멤버 카드에 등록된 이름과 동일하게 입력</div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="example@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="8자 이상">
    </div>
    <div class="field">
      <label>Password 확인</label>
      <input type="password" id="password2" placeholder="••••••••">
    </div>
    <button class="btn" onclick="register()">▶ REGISTER</button>
    <div class="msg" id="msg"></div>
    <div class="links">
      이미 계정이 있으신가요? <a href="/login">로그인</a>
    </div>
  </div>
</div>
<script>
const sb = supabase.createClient(
  'https://jixnmdbcffrymvcpmmmo.supabase.co',
  'sb_publishable_tFznbTB8vMgC_vwJdujcKw_tL4HsfT1'
);

async function register() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (!name || !email || !password) { showMsg('모든 항목을 입력해주세요.', 'error'); return; }
  if (password !== password2) { showMsg('비밀번호가 일치하지 않습니다.', 'error'); return; }
  if (password.length < 8) { showMsg('비밀번호는 8자 이상이어야 합니다.', 'error'); return; }

  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { name } }
  });

  if (error) { showMsg(error.message, 'error'); return; }

  showMsg('가입 완료! 관리자가 멤버 카드를 연결해주면 수정이 가능합니다.', 'success');
  setTimeout(() => window.location.href = '/login', 2500);
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
  msg.style.display = 'block';
}
</script>
</body>
</html>
