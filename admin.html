<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seKUrity — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --accent: #2ade02; --accent-dim: rgba(42,222,2,0.15);
    --accent-glow: rgba(42,222,2,0.6); --bg: #000; --bg2: #050a03;
    --border: rgba(42,222,2,0.35); --text: #c8f5c0;
    --text-dim: rgba(200,245,192,0.75); --danger: #ff3030;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; }
  body::before {
    content:''; position:fixed; inset:0; z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    pointer-events:none;
  }
  nav {
    position:sticky; top:0; z-index:100;
    border-bottom:1px solid var(--border); background:rgba(0,0,0,0.92);
    backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(16px,4vw,48px); height:56px;
  }
  .nav-logo { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; letter-spacing:4px; color:var(--text); text-decoration:none; }
  .nav-logo .ku { color:var(--accent); text-shadow:0 0 10px var(--accent-glow); }
  .nav-right { display:flex; align-items:center; gap:16px; font-size:11px; }
  .nav-right a { color:var(--text-dim); text-decoration:none; letter-spacing:2px; }
  .nav-right a:hover { color:var(--accent); }

  .container { padding:40px clamp(16px,6vw,80px); max-width:1200px; }

  .page-title { font-family:'Orbitron',sans-serif; font-size:clamp(24px,4vw,40px); font-weight:700; margin-bottom:8px; }
  .page-title span { color:var(--accent); }
  .page-sub { font-size:11px; color:var(--text-dim); letter-spacing:3px; margin-bottom:48px; }

  .section { margin-bottom:56px; }
  .section-title {
    font-family:'Orbitron',sans-serif; font-size:14px; letter-spacing:3px;
    color:var(--accent); margin-bottom:20px; padding-bottom:12px;
    border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;
  }

  /* 멤버 테이블 */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { font-size:9px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; padding:10px 12px; border-bottom:1px solid var(--border); text-align:left; }
  td { padding:12px; border-bottom:1px solid rgba(42,222,2,0.07); color:var(--text); vertical-align:middle; }
  tr:hover td { background:rgba(42,222,2,0.03); }
  .role-badge {
    font-size:9px; letter-spacing:2px; padding:3px 8px; border:1px solid;
    text-transform:uppercase;
  }
  .role-president { color:var(--accent); border-color:var(--accent); }
  .role-vice_president { color:#00cfff; border-color:#00cfff; }
  .role-member { color:var(--text-dim); border-color:var(--border); }

  .btn-sm {
    font-size:10px; letter-spacing:2px; padding:5px 12px;
    border:1px solid; background:transparent; cursor:pointer;
    font-family:'Share Tech Mono',monospace; text-transform:uppercase; transition:background .2s;
  }
  .btn-edit { color:var(--accent); border-color:var(--accent); }
  .btn-edit:hover { background:rgba(42,222,2,0.1); }
  .btn-delete { color:var(--danger); border-color:var(--danger); }
  .btn-delete:hover { background:rgba(255,48,48,0.1); }
  .btn-assign { color:#00cfff; border-color:#00cfff; }
  .btn-assign:hover { background:rgba(0,207,255,0.1); }

  /* 폼 */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:600px) { .form-grid { grid-template-columns:1fr; } }
  .form-field { display:flex; flex-direction:column; gap:6px; }
  .form-field label { font-size:10px; letter-spacing:3px; color:var(--accent); text-transform:uppercase; }
  .form-field input, .form-field select {
    background:rgba(42,222,2,0.04); border:1px solid var(--border);
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:13px;
    padding:10px 14px; outline:none; transition:border-color .2s;
  }
  .form-field input:focus, .form-field select:focus { border-color:var(--accent); }
  .form-field select option { background:#0a0a0a; }
  .form-full { grid-column:1/-1; }
  .btn-primary {
    padding:12px 28px; border:1px solid var(--accent);
    background:rgba(42,222,2,0.08); color:var(--accent);
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px;
    text-transform:uppercase; cursor:pointer; transition:background .2s;
    clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  }
  .btn-primary:hover { background:rgba(42,222,2,0.18); }

  /* 유저 목록 */
  .user-card {
    border:1px solid var(--border); background:rgba(42,222,2,0.02);
    padding:16px 20px; display:flex; align-items:center; justify-content:space-between;
    gap:16px; margin-bottom:2px; flex-wrap:wrap;
  }
  .user-info { font-size:12px; }
  .user-name { color:var(--text); margin-bottom:4px; }
  .user-email { color:var(--text-dim); font-size:11px; }
  .user-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  .assign-select {
    background:rgba(42,222,2,0.04); border:1px solid var(--border);
    color:var(--text); font-family:'Share Tech Mono',monospace; font-size:11px;
    padding:5px 10px; outline:none;
  }
  .assign-select option { background:#0a0a0a; }

  .toast {
    position:fixed; bottom:24px; right:24px; z-index:10000;
    padding:12px 20px; border:1px solid var(--accent);
    background:rgba(0,0,0,0.95); color:var(--accent);
    font-size:12px; letter-spacing:2px; display:none;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000;
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    border:1px solid var(--accent); background:#000;
    padding:36px; width:100%; max-width:500px; position:relative;
    clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);
  }
  .modal-title { font-family:'Orbitron',sans-serif; font-size:16px; color:var(--accent); margin-bottom:24px; }
  .modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; }
  .modal-close:hover { color:var(--danger); }
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">se<span class="ku">KU</span>rity</a>
  <div class="nav-right">
    <span id="admin-name" style="color:var(--accent);"></span>
    <a href="#" onclick="logout()">LOGOUT</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">ADMIN<span> PANEL</span></div>
  <div class="page-sub">// seKUrity 관리자 페이지</div>

  <!-- 멤버 목록 -->
  <div class="section">
    <div class="section-title">
      <span>// MEMBERS</span>
      <button class="btn-primary" onclick="openAddModal()">+ ADD MEMBER</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>이름</th>
            <th>직책</th>
            <th>관심분야</th>
            <th>블로그</th>
            <th>연결된 유저</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="members-tbody">
          <tr><td colspan="7" style="color:var(--text-dim);text-align:center;padding:24px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 가입 유저 목록 -->
  <div class="section">
    <div class="section-title">// REGISTERED USERS</div>
    <div id="users-list">
      <div style="color:var(--text-dim);font-size:12px;">Loading...</div>
    </div>
  </div>
</div>

<!-- 멤버 추가/수정 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">// ADD MEMBER</div>
    <div class="form-grid">
      <input type="hidden" id="edit-id">
      <div class="form-field">
        <label>이름</label>
        <input type="text" id="f-name" placeholder="홍길동">
      </div>
      <div class="form-field">
        <label>직책</label>
        <select id="f-role">
          <option value="president">President</option>
          <option value="vice_president">Vice President</option>
          <option value="member" selected>Member</option>
        </select>
      </div>
      <div class="form-field form-full">
        <label>관심분야 (쉼표로 구분)</label>
        <input type="text" id="f-fields" placeholder="Web Hacking, Pwnable, Reversing">
      </div>
      <div class="form-field form-full">
        <label>블로그 URL</label>
        <input type="text" id="f-blog" placeholder="https://...">
      </div>
      <div class="form-field">
        <label>순서</label>
        <input type="number" id="f-order" placeholder="99">
      </div>
    </div>
    <div style="margin-top:24px;">
      <button class="btn-primary" onclick="saveMember()">▶ SAVE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = supabase.createClient(
  'https://jixnmdbcffrymvcpmmmo.supabase.co',
  'sb_publishable_tFznbTB8vMgC_vwJdujcKw_tL4HsfT1'
);

let members = [];
let users = [];

async function init() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!profile?.is_admin) { window.location.href = 'index.html'; return; }

  document.getElementById('admin-name').textContent = profile.name || 'ADMIN';

  await loadMembers();
  await loadUsers();
}

async function loadMembers() {
  const { data } = await sb.from('members').select('*').order('display_order');
  members = data || [];
  renderMembers();
}

async function loadUsers() {
  const { data } = await sb.from('profiles').select('*');
  users = data || [];
  renderUsers();
}

function renderMembers() {
  const tbody = document.getElementById('members-tbody');
  if (!members.length) { tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-dim);text-align:center;padding:24px;">멤버 없음</td></tr>'; return; }

  tbody.innerHTML = members.map((m, i) => {
    const assignedUser = users.find(u => u.id === m.assigned_user_id);
    return `
    <tr>
      <td style="color:var(--text-dim)">${m.display_order}</td>
      <td><strong>${m.name}</strong></td>
      <td><span class="role-badge role-${m.role}">${m.role.replace('_',' ')}</span></td>
      <td style="color:var(--text-dim);font-size:11px;">${(m.fields||[]).join(', ')}</td>
      <td style="font-size:11px;">${m.blog_url ? `<a href="${m.blog_url}" target="_blank" style="color:var(--accent);">LINK</a>` : '-'}</td>
      <td style="font-size:11px;color:${assignedUser ? 'var(--accent)' : 'var(--text-dim)'}">
        ${assignedUser ? assignedUser.name || '연결됨' : '미연결'}
      </td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn-sm btn-edit" onclick="openEditModal('${m.id}')">EDIT</button>
          <button class="btn-sm btn-delete" onclick="deleteMember('${m.id}', '${m.name}')">DEL</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderUsers() {
  const list = document.getElementById('users-list');
  if (!users.length) { list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;">가입된 유저 없음</div>'; return; }

  list.innerHTML = users.map(u => {
    const assignedMember = members.find(m => m.assigned_user_id === u.id);
    return `
    <div class="user-card">
      <div class="user-info">
        <div class="user-name">${u.name || '(이름 없음)'}</div>
        <div class="user-email">${u.id.slice(0,8)}...</div>
      </div>
      <div class="user-actions">
        <span style="font-size:11px;color:${assignedMember ? 'var(--accent)' : 'var(--text-dim)'}">
          ${assignedMember ? `→ ${assignedMember.name}` : '미할당'}
        </span>
        <select class="assign-select" onchange="assignUser('${u.id}', this.value)">
          <option value="">멤버 선택...</option>
          ${members.map(m => `<option value="${m.id}" ${m.assigned_user_id === u.id ? 'selected' : ''}>${m.name}</option>`).join('')}
        </select>
        <button class="btn-sm btn-sm" style="color:var(--danger);border-color:var(--danger);" onclick="toggleAdmin('${u.id}', ${u.is_admin})">
          ${u.is_admin ? 'REVOKE ADMIN' : 'MAKE ADMIN'}
        </button>
      </div>
    </div>`;
  }).join('');
}

async function assignUser(userId, memberId) {
  // 기존 할당 해제
  await sb.from('members').update({ assigned_user_id: null }).eq('assigned_user_id', userId);

  if (memberId) {
    await sb.from('members').update({ assigned_user_id: userId }).eq('id', memberId);
  }

  await loadMembers();
  await loadUsers();
  toast('할당 완료!');
}

async function toggleAdmin(userId, isAdmin) {
  await sb.from('profiles').update({ is_admin: !isAdmin }).eq('id', userId);
  await loadUsers();
  toast(isAdmin ? '관리자 권한 해제' : '관리자 권한 부여');
}

function openAddModal() {
  document.getElementById('modal-title').textContent = '// ADD MEMBER';
  document.getElementById('edit-id').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-role').value = 'member';
  document.getElementById('f-fields').value = '';
  document.getElementById('f-blog').value = '';
  document.getElementById('f-order').value = '99';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const m = members.find(m => m.id === id);
  if (!m) return;
  document.getElementById('modal-title').textContent = '// EDIT MEMBER';
  document.getElementById('edit-id').value = m.id;
  document.getElementById('f-name').value = m.name;
  document.getElementById('f-role').value = m.role;
  document.getElementById('f-fields').value = (m.fields||[]).join(', ');
  document.getElementById('f-blog').value = m.blog_url || '';
  document.getElementById('f-order').value = m.display_order;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

async function saveMember() {
  const id = document.getElementById('edit-id').value;
  const data = {
    name: document.getElementById('f-name').value.trim(),
    role: document.getElementById('f-role').value,
    fields: document.getElementById('f-fields').value.split(',').map(s=>s.trim()).filter(Boolean),
    blog_url: document.getElementById('f-blog').value.trim() || null,
    display_order: parseInt(document.getElementById('f-order').value) || 99,
  };

  if (!data.name) { toast('이름을 입력해주세요.'); return; }

  if (id) {
    await sb.from('members').update(data).eq('id', id);
    toast('수정 완료!');
  } else {
    await sb.from('members').insert(data);
    toast('추가 완료!');
  }

  closeModal();
  await loadMembers();
}

async function deleteMember(id, name) {
  if (!confirm(`${name} 을(를) 삭제할까요?`)) return;
  await sb.from('members').delete().eq('id', id);
  await loadMembers();
  toast('삭제 완료!');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

init();
</script>
</body>
</html>
